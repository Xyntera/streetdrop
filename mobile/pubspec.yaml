name: streetdrop
description: StreetDrop — Location-gated NFT drops on Solana Mobile
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  http: ^1.2.1
  flutter_map: ^6.2.1
  latlong2: ^0.9.1
  geolocator: ^11.0.0
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  supabase_flutter: ^2.5.6
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - .env
